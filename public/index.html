<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity x Firebase | Impact PS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCA28;
            --secondary: #039BE5;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #FFCA28, #FFA000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94A3B8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .status-card {
            background: #0F172A;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--secondary);
            display: flex;
            align-items: center;
            gap: 1rem;
            text-align: left;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4d4d;
        }

        .status-dot.online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 1rem 2rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 202, 40, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conectando...</h1>
        <p>Integración Antigravity x Firebase (ID: impactps-75819)</p>
        
        <div class="status-card">
            <div id="status-bubble" class="status-dot"></div>
            <div>
                <strong id="status-title">Estado: Desconectado</strong><br>
                <small id="status-msg">Falta configurar las credenciales en firebaseConfig.js</small>
            </div>
        </div>

        <button class="btn" id="btn-test">Probar Conexión</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
